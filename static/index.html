<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APIQIK 图像生成</title>
  <meta name="description" content="APIQIK 并发图像生成 Web 应用" />
  <link rel="icon"
    href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="%2308090f"/><path d="M14 42 27 20l9 15 5-8 9 15H14z" fill="%2314b8a6"/><circle cx="44" cy="20" r="6" fill="%23f59e0b"/></svg>' />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --bg: #08090f;
      --panel: rgba(255, 255, 255, 0.055);
      --panel-strong: rgba(255, 255, 255, 0.085);
      --line: rgba(255, 255, 255, 0.12);
      --line-hot: rgba(20, 184, 166, 0.45);
      --text: #e8eef7;
      --muted: #93a2b7;
      --soft: #64748b;
      --teal: #14b8a6;
      --blue: #38bdf8;
      --violet: #8b5cf6;
      --amber: #f59e0b;
      --red: #fb7185;
      --green: #22c55e;
      --radius: 8px;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.36);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(140deg, rgba(20, 184, 166, 0.13), transparent 34%),
        linear-gradient(300deg, rgba(139, 92, 246, 0.15), transparent 38%),
        radial-gradient(circle at 58% 0%, rgba(56, 189, 248, 0.11), transparent 36%),
        var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      color: inherit;
    }

    .page {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 52px);
      line-height: 1;
      letter-spacing: 0;
      background: linear-gradient(120deg, #f8fafc, #7dd3fc 38%, #c4b5fd 72%, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .workspace {
      display: grid;
      gap: 18px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(420px, 0.82fr) minmax(0, 1.18fr);
      gap: 18px;
      align-items: stretch;
      min-height: clamp(420px, calc(100vh - 250px), 760px);
    }

    .command-bar .section {
      display: grid;
      gap: 14px;
    }

    .command-top {
      display: grid;
      grid-template-columns: minmax(220px, 0.9fr) minmax(160px, 0.55fr) auto auto;
      gap: 12px;
      align-items: end;
    }

    .command-status {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .input-panel,
    .logs-panel {
      min-width: 0;
    }

    .results-panel {
      min-width: 0;
      display: flex;
      flex-direction: column;
      contain: size;
    }

    .results-panel > .section {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .section {
      padding: 18px;
    }

    .section+.section {
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #c7d2fe;
    }

    .config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input,
    select,
    textarea {
      width: 100%;
      color: var(--text);
      background: rgba(3, 7, 18, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    input,
    select {
      height: 42px;
      padding: 0 12px;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
      padding: 12px;
      line-height: 1.55;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--line-hot);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.16);
      background: rgba(3, 7, 18, 0.72);
    }

    input:disabled,
    select:disabled,
    textarea:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    select option {
      background: #111827;
    }

    .prompt-area textarea {
      min-height: 236px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 15px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.07);
      cursor: pointer;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
    }

    .btn svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .btn-primary {
      border-color: rgba(20, 184, 166, 0.45);
      background: linear-gradient(135deg, #14b8a6, #2563eb);
      color: white;
      box-shadow: 0 14px 35px rgba(20, 184, 166, 0.28);
    }

    .btn-blue {
      border-color: rgba(56, 189, 248, 0.45);
      background: rgba(56, 189, 248, 0.15);
      color: #7dd3fc;
    }

    .btn-blue:hover {
      background: rgba(56, 189, 248, 0.25);
    }

    .btn-warn {
      border-color: rgba(245, 158, 11, 0.38);
      color: #fbbf24;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      padding: 0;
    }

    .dropzone {
      position: relative;
      min-height: 124px;
      display: grid;
      place-items: center;
      padding: 18px;
      border: 1px dashed rgba(125, 211, 252, 0.45);
      border-radius: var(--radius);
      background: rgba(56, 189, 248, 0.055);
      text-align: center;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.18s ease, background 0.18s ease;
    }

    .dropzone.dragging {
      border-color: var(--teal);
      background: rgba(20, 184, 166, 0.12);
    }

    .dropzone strong {
      display: block;
      color: var(--text);
      margin-bottom: 6px;
    }

    .upload-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .thumb {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb button {
      position: absolute;
      right: 5px;
      top: 5px;
      width: 26px;
      height: 26px;
      border: 0;
      border-radius: 50%;
      background: rgba(3, 7, 18, 0.72);
      cursor: pointer;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--soft);
    }

    .dot.ok {
      background: var(--green);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.75);
    }

    .dot.busy {
      background: var(--amber);
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.75);
    }

    .dot.bad {
      background: var(--red);
      box-shadow: 0 0 12px rgba(251, 113, 133, 0.75);
    }

    .progress-wrap {
      --progress: 0%;
      position: relative;
      display: block;
      height: 3px;
      overflow: visible;
      border-radius: 999px;
      isolation: isolate;
    }

    .progress-track,
    .progress-bar {
      position: absolute;
      inset: 0;
      border-radius: inherit;
    }

    .progress-track {
      background: rgba(148, 163, 184, 0.16);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.22);
    }

    .progress-bar {
      width: var(--progress);
      background: linear-gradient(90deg, #14b8a6, #38bdf8 78%, rgba(248, 250, 252, 0.92));
      box-shadow: 0 0 8px rgba(56, 189, 248, 0.28);
      transition: width 0.28s ease;
    }

    .progress-glow {
      position: absolute;
      left: var(--progress);
      top: 50%;
      width: 10px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(248, 250, 252, 0), rgba(248, 250, 252, 0.92) 46%, rgba(125, 211, 252, 0.58));
      box-shadow:
        0 0 5px rgba(248, 250, 252, 0.62),
        0 0 10px rgba(56, 189, 248, 0.42);
      transform: translate(-50%, -50%);
      animation: progressBreathe 1.55s ease-in-out infinite;
      pointer-events: none;
      z-index: 2;
    }

    .progress-wrap.is-zero .progress-glow {
      left: 0%;
      transform: translate(0, -50%);
    }

    .run-progress {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
    }

    @keyframes progressBreathe {

      0%,
      100% {
        opacity: 0.68;
      }

      50% {
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .progress-glow {
        animation: none;
      }
    }

    .logs {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
    }

    .logbox {
      min-height: 250px;
      max-height: 410px;
      overflow: auto;
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(3, 7, 18, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #cbd5e1;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .result-browser {
      display: grid;
      grid-template-columns: 230px minmax(0, 1fr);
      gap: 14px;
      min-height: 0;
      flex: 1;
    }

    .run-list,
    .result-detail {
      min-height: 0;
      height: 100%;
      overflow: auto;
      scrollbar-gutter: stable;
    }

    .run-list {
      display: grid;
      align-content: start;
      gap: 10px;
      padding-right: 8px;
    }

    .result-group {
      width: 100%;
      min-height: 78px;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 8px 8px 12px;
      text-align: left;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.045);
      color: inherit;
      cursor: pointer;
    }

    .result-group.active {
      border-color: rgba(20, 184, 166, 0.55);
      background: rgba(20, 184, 166, 0.12);
    }

    .run-cover {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.07);
      color: var(--muted);
      font-size: 11px;
    }

    .run-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .run-card-title {
      margin: 0 0 5px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .run-card-meta {
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
    }

    .result-detail {
      min-width: 0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      background: rgba(3, 7, 18, 0.28);
    }

    .detail-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .detail-title {
      margin: 0 0 7px;
      font-size: 15px;
      color: var(--text);
    }

    .result-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn-small {
      min-height: 32px;
      padding: 0 10px;
      font-size: 12px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      padding: 12px;
    }

    .empty-state {
      min-height: 180px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border: 1px dashed rgba(255, 255, 255, 0.14);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.035);
      text-align: center;
    }

    .empty-state.compact {
      min-height: 120px;
    }

    .logs-panel summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      cursor: pointer;
      color: #c7d2fe;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .logs-panel summary::marker {
      display: none;
    }

    .image-card {
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.055);
    }

    .image-card button.preview {
      display: block;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: zoom-in;
    }

    .image-card img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
    }

    .image-meta {
      display: grid;
      gap: 7px;
      padding: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .image-meta-main,
    .image-details {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .image-details {
      color: #cbd5e1;
    }

    .image-meta a {
      color: #7dd3fc;
      text-decoration: none;
      font-weight: 700;
    }

    .notice {
      display: none;
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(245, 158, 11, 0.35);
      background: rgba(245, 158, 11, 0.1);
      color: #fde68a;
      font-size: 14px;
    }

    .notice.show {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.82);
    }

    .lightbox.show {
      display: flex;
    }

    .lightbox img {
      max-width: min(100%, 1180px);
      max-height: 88vh;
      border-radius: var(--radius);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.55);
    }

    .lightbox button {
      position: fixed;
      right: 22px;
      top: 22px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.08);
    }

    @media (max-width: 980px) {
      .main-grid {
        grid-template-columns: 1fr;
        min-height: 0;
      }

      .results-panel {
        contain: none;
      }

      .command-top {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .logs {
        grid-template-columns: 1fr;
      }

      .result-browser {
        grid-template-columns: 1fr;
        height: auto;
        min-height: 0;
      }

      .run-list {
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        height: auto;
        max-height: min(360px, 55vh);
      }

      .result-detail {
        height: auto;
        max-height: none;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .config-grid {
        grid-template-columns: 1fr;
      }

      .settings-grid {
        grid-template-columns: 1fr;
      }

      .command-top {
        grid-template-columns: 1fr;
      }

      .section {
        padding: 14px;
      }

      .control-row {
        align-items: stretch;
      }

      .control-row>div {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <h1>GG</h1>
        <p>工作台</p>
      </div>
      <div class="top-actions">
        <a class="btn btn-blue" href="/settings" title="打开设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />
            <path
              d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6V20a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-.6 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1H4a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 .6-1 1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6V4a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 .6 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.2.35.4.7.6 1H20a2 2 0 1 1 0 4h-.09c-.2.3-.4.65-.51 1Z" />
          </svg>
          设置
        </a>
      </div>
    </header>

    <div id="keyNotice" class="notice">
      <span>缺少 APIQIK Key，请先在设置页保存密钥。</span>
      <a class="btn btn-warn" href="/settings">去设置</a>
    </div>

    <div class="workspace">
      <div class="panel command-bar">
        <section class="section">
          <div class="command-top">
            <div class="field">
              <label for="model">模型</label>
              <select id="model">
                <option value="gpt-image-2-flatfee">gpt-image-2-flatfee</option>
                <option value="gpt-image-2-flatfee-4k">gpt-image-2-flatfee-4k</option>
                <option value="gpt-image-2-flatfee-2k">gpt-image-2-flatfee-2k</option>
                <option value="gpt-image-2-vip">gpt-image-2-vip</option>

  <script>
    const sizeToRatio = {
      // 1:1
      "1024x1024": "1:1",
      "1536x1536": "1:1",
      "2048x2048": "1:1",
      // 2:3
      "1024x1536": "2:3",
      "1152x1728": "2:3",
      "1280x1920": "2:3",
      "1536x2304": "2:3",
      // 3:2
      "1536x1024": "3:2",
      "1728x1152": "3:2",
      "1920x1280": "3:2",
      "2304x1536": "3:2",
      // 3:4
      "1024x1360": "3:4",
      "1152x1536": "3:4",
      "1536x2048": "3:4",
      "2160x2880": "3:4",
      // 4:3
      "1360x1024": "4:3",
      "1536x1152": "4:3",
      "2048x1536": "4:3",
      "2880x2160": "4:3",
      // 4:5
      "1024x1280": "4:5",
      "1152x1440": "4:5",
      "1536x1920": "4:5",
      "2048x2560": "4:5",
      // 5:4
      "1280x1024": "5:4",
      "1440x1152": "5:4",
      "1920x1536": "5:4",
      "2560x2048": "5:4",
      // 9:16
      "1024x1824": "9:16",
      "1152x2048": "9:16",
      "1440x2560": "9:16",
      "2160x3840": "9:16",
      // 16:9
      "1824x1024": "16:9",
      "2048x1152": "16:9",
      "2560x1440": "16:9",
      "3840x2160": "16:9",
      // 21:9
      "2560x1088": "21:9",
      "3440x1440": "21:9"
    };
    const ratios = ["1:1", "2:3", "3:2", "3:4", "4:3", "4:5", "5:4", "9:16", "16:9", "21:9", "custom"];
    const sizes = Object.keys(sizeToRatio);
    const ratioToSizes = sizes.reduce((acc, size) => {
      const ratio = sizeToRatio[size];
      acc[ratio] = acc[ratio] || [];
      acc[ratio].push(size);
      return acc;
    }, {});

    const els = {
      model: document.getElementById("model"),
      ratioField: document.getElementById("ratioField"),
      ratio: document.getElementById("ratio"),
      sizeField: document.getElementById("sizeField"),
      size: document.getElementById("size"),
      customSizeField: document.getElementById("customSizeField"),
      customSize: document.getElementById("customSize"),
      quality: document.getElementById("quality"),
      background: document.getElementById("background"),
      outputFormat: document.getElementById("outputFormat"),
      concurrency: document.getElementById("concurrency"),
      prompt: document.getElementById("prompt"),
      startBtn: document.getElementById("startBtn"),
      clearBtn: document.getElementById("clearBtn"),
      clearResultsBtn: document.getElementById("clearResultsBtn"),
      systemLog: document.getElementById("systemLog"),
      runDot: document.getElementById("runDot"),
      runStatus: document.getElementById("runStatus"),
      keyDot: document.getElementById("keyDot"),
      keyLabel: document.getElementById("keyLabel"),
      keyNotice: document.getElementById("keyNotice"),
      runList: document.getElementById("runList"),
      runDetail: document.getElementById("runDetail"),
      detailGallery: document.getElementById("detailGallery"),
      galleryCount: document.getElementById("galleryCount"),
      dropzone: document.getElementById("dropzone"),
      fileInput: document.getElementById("fileInput"),
      thumbs: document.getElementById("thumbs"),
      uploadStatus: document.getElementById("uploadStatus"),
      urlStatus: document.getElementById("urlStatus"),
      tabUploadBtn: document.getElementById("tabUploadBtn"),
      tabUrlBtn: document.getElementById("tabUrlBtn"),
      uploadPanel: document.getElementById("uploadPanel"),
      urlPanel: document.getElementById("urlPanel"),
      urlInput: document.getElementById("urlInput"),
      addUrlBtn: document.getElementById("addUrlBtn"),
      lightbox: document.getElementById("lightbox"),
      lightboxImage: document.getElementById("lightboxImage"),
      closeLightbox: document.getElementById("closeLightbox")
    };

    const activeTasks = new Map();
    let totalGeneratedCount = 0;
    let visibleGeneratedCount = 0;
    let runCount = 0;
    let activeRunGroup = null;
    let runs = [];
    let activeRunId = null;
    let uploadedImages = [];
    const imageHashCacheKey = "apiqik_image_hash_cache";

    function fillSelect(select, values, selected) {
      select.innerHTML = values.map(value => {
        let label = value || "默认";
        if (value === "custom") label = "自定义输入";
        return `<option value="${value}">${label}</option>`;
      }).join("");
      select.value = selected && values.includes(selected) ? selected : values[0];
    }

    function initLinkedSizeControls() {
      fillSelect(els.ratio, ratios, "1:1");
      fillSelect(els.size, ["", ...ratioToSizes["1:1"]], "");

      els.ratio.addEventListener("change", () => {
        if (els.ratio.value === "custom") {
          els.sizeField.style.display = "none";
          els.customSizeField.style.display = "";
        } else {
          els.sizeField.style.display = "";
          els.customSizeField.style.display = "none";
          const available = ratioToSizes[els.ratio.value] || sizes;
          fillSelect(els.size, ["", ...available], els.size.value);
        }
      });

      els.size.addEventListener("change", () => {
        if (sizeToRatio[els.size.value]) els.ratio.value = sizeToRatio[els.size.value];
      });

      els.customSize.addEventListener("blur", fixCustomSize);
      els.model.addEventListener("change", updateModelVisibility);
      updateModelVisibility();
    }

    function updateModelVisibility() {
      const model = els.model.value;
      const isFixedSize = model === "gpt-image-2-flatfee-2k" || model === "gpt-image-2-flatfee-4k";
      const isCustomizable = model === "gpt-image-2-flatfee" || model === "gpt-image-2-vip";

      els.ratioField.style.display = isFixedSize ? "none" : "";
      
      if (isFixedSize) {
        els.sizeField.style.display = "none";
        els.customSizeField.style.display = "";
        
        if (els.customSize.dataset.cachedValue === undefined) {
          els.customSize.dataset.cachedValue = els.customSize.value;
        }
        
        els.customSize.disabled = true;
        els.customSize.value = model === "gpt-image-2-flatfee-2k" ? "2048x1152" : "3840x2160";
        els.customSizeField.querySelector("label").textContent = "尺寸 (固定)";
      } else {
        els.customSize.disabled = false;
        els.customSizeField.querySelector("label").textContent = "自定义尺寸";
        
        if (els.customSize.dataset.cachedValue !== undefined) {
          els.customSize.value = els.customSize.dataset.cachedValue;
          delete els.customSize.dataset.cachedValue;
        }

        if (!isCustomizable) {
          if (els.ratio.value === "custom") els.ratio.value = "1:1";
          els.sizeField.style.display = "";
          els.customSizeField.style.display = "none";
        } else {
          if (els.ratio.value === "custom") {
            els.sizeField.style.display = "none";
            els.customSizeField.style.display = "";
          } else {
            els.sizeField.style.display = "";
            els.customSizeField.style.display = "none";
          }
        }
      }
    }

    function fixCustomSize() {
      let val = els.customSize.value.trim().toLowerCase().replace(/\s+/g, '');
      if (!val) return;
      const match = val.match(/^(\d+)[x\*](\d+)$/);
      if (!match) {
         els.customSize.value = "";
         return;
      }
      let w = parseInt(match[1]);
      let h = parseInt(match[2]);

      let origRatio = w / h;

      if (origRatio > 3) {
          w = h * 3;
          origRatio = 3;
      } else if (1 / origRatio > 3) {
          h = w * 3;
          origRatio = 1 / 3;
      }

      let px = w * h;
      if (px < 655360) {
          let scale = Math.sqrt(655360 / px);
          w = w * scale;
          h = h * scale;
      } else if (px > 8294400) {
          let scale = Math.sqrt(8294400 / px);
          w = w * scale;
          h = h * scale;
      }

      if (w > 3840) {
          w = 3840;
          h = w / origRatio;
      }
      if (h > 3840) {
          h = 3840;
          w = h * origRatio;
      }

      let w16 = Math.round(w / 16) * 16;
      let h16 = Math.round(h / 16) * 16;
      
      if (w16 * h16 > 8294400) {
          w16 = Math.floor(w / 16) * 16;
          h16 = Math.floor(h / 16) * 16;
      }
      
      if (w16 * h16 < 655360) {
          w16 = Math.ceil(w / 16) * 16;
          h16 = Math.ceil(h / 16) * 16;
      }

      if (w16 > 3840) w16 = 3840;
      if (h16 > 3840) h16 = 3840;
      if (w16 < 16) w16 = 16;
      if (h16 < 16) h16 = 16;

      while (w16 / h16 > 3) w16 -= 16;
      while (h16 / w16 > 3) h16 -= 16;

      els.customSize.value = `${w16}x${h16}`;
    }

    function updateKeyState() {
      const model = els.model ? els.model.value : "";
      let apiKey = localStorage.getItem("apiqik_key");
      if (model === "gpt-image-2-vip" && localStorage.getItem("apiqik_vip_key")) {
        apiKey = localStorage.getItem("apiqik_vip_key");
      }
      const hasKey = !!apiKey;
      els.keyDot.className = `dot ${hasKey ? "ok" : "bad"}`;
      els.keyLabel.textContent = hasKey ? "已配置" : "未配置";
      els.keyNotice.classList.toggle("show", !hasKey);
    }

    function setRunState(state, text) {
      els.runDot.className = `dot ${state || ""}`;
      els.runStatus.textContent = text;
    }

    function updateActiveTaskState() {
      const count = activeTasks.size;
      if (count > 0) {
        setRunState("busy", `运行中 ${count} 组`);
      } else {
        setRunState("", "待开始");
      }
    }

    function logSystem(message) {
      const time = new Date().toLocaleTimeString("zh-CN", { hour12: false });
      els.systemLog.textContent += `[${time}] ${message}\n`;
      els.systemLog.scrollTop = els.systemLog.scrollHeight;
    }

    function clearLogs() {
      els.systemLog.textContent = "";
      setRunState("", "待开始");
    }

    async function clearResults() {
      if (activeTasks.size) {
        logSystem("生成中暂不清空结果。");
        return;
      }
      if (!runs.length) return;
      if (!confirm(`删除全部 ${runs.length} 个结果组及其图片文件？`)) return;
      const ids = runs.map(run => run.run_id);
      for (const runId of ids) {
        await deleteRunGroup(runId, { skipConfirm: true });
      }
      totalGeneratedCount = 0;
      visibleGeneratedCount = 0;
      runCount = 0;
      activeRunGroup = null;
      activeRunId = null;
      renderResults();
      updateGalleryCount();
    }

    function updateGalleryCount() {
      els.galleryCount.textContent = `${visibleGeneratedCount} 张结果`;
    }

    function getR2Config() {
      const keys = ["cf_access_key", "cf_secret_key", "cf_account_id", "cf_bucket", "cf_public_url"];
      const config = Object.fromEntries(keys.map(key => [key, localStorage.getItem(key) || ""]));
      return keys.every(key => config[key]) ? config : null;
    }

    function getImageUrls() {
      return uploadedImages.map(item => item.url);
    }

    function readImageHashCache() {
      try {
        const parsed = JSON.parse(localStorage.getItem(imageHashCacheKey) || "{}");
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function getCachedReferenceImage(hash) {
      const cached = readImageHashCache()[hash];
      return cached?.url ? cached : null;
    }

    function cacheReferenceImage(hash, url, name) {
      const cache = readImageHashCache();
      cache[hash] = {
        url,
        name,
        savedAt: new Date().toISOString()
      };
      localStorage.setItem(imageHashCacheKey, JSON.stringify(cache));
    }

    function fileToImage(file, previewUrl) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.onload = () => resolve(image);
        image.onerror = () => reject(new Error("图片读取失败"));
        image.src = previewUrl;
      });
    }

    async function computeImageDHash(file, previewUrl) {
      const image = await fileToImage(file, previewUrl);
      const canvas = document.createElement("canvas");
      canvas.width = 9;
      canvas.height = 8;
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(image, 0, 0, canvas.width, canvas.height);
      const pixels = context.getImageData(0, 0, canvas.width, canvas.height).data;
      let bits = "";
      for (let y = 0; y < 8; y += 1) {
        for (let x = 0; x < 8; x += 1) {
          const left = pixelLuma(pixels, y * 9 + x);
          const right = pixelLuma(pixels, y * 9 + x + 1);
          bits += left > right ? "1" : "0";
        }
      }
      let hex = "";
      for (let i = 0; i < bits.length; i += 4) {
        hex += parseInt(bits.slice(i, i + 4), 2).toString(16);
      }
      return hex;
    }

    function pixelLuma(pixels, index) {
      const offset = index * 4;
      return pixels[offset] * 0.299 + pixels[offset + 1] * 0.587 + pixels[offset + 2] * 0.114;
    }

    async function uploadFiles(files) {
      const r2 = getR2Config();
      if (!r2) {
        alert("未配置 Cloudflare R2，无法使用本地上传。\n请在设置页进行配置，或切换至「网络链接」输入参考图。");
        logSystem("Cloudflare R2 配置不完整，无法上传参考图。");
        return;
      }

      const list = Array.from(files).filter(file => file.type.startsWith("image/"));
      if (!list.length) return;

      els.uploadStatus.textContent = `上传中 0/${list.length}`;
      for (let i = 0; i < list.length; i += 1) {
        const file = list[i];
        const preview = URL.createObjectURL(file);
        let hash = "";
        try {
          hash = await computeImageDHash(file, preview);
        } catch (error) {
          URL.revokeObjectURL(preview);
          logSystem(`参考图识别失败: ${file.name} ${error.message}`);
          els.uploadStatus.textContent = `上传中 ${i + 1}/${list.length}`;
          continue;
        }

        const existing = uploadedImages.find(item => item.hash === hash);
        if (existing) {
          URL.revokeObjectURL(preview);
          logSystem(`参考图已在当前任务中: ${file.name}`);
          els.uploadStatus.textContent = `上传中 ${i + 1}/${list.length}`;
          continue;
        }

        const cached = getCachedReferenceImage(hash);
        if (cached) {
          uploadedImages.push({ url: cached.url, name: file.name, preview, hash, cached: true });
          logSystem(`参考图命中本地缓存，跳过上传: ${file.name}`);
          renderThumbs();
          els.uploadStatus.textContent = `上传中 ${i + 1}/${list.length}`;
          continue;
        }

        const form = new FormData();
        form.append("file", file);
        Object.entries(r2).forEach(([key, value]) => form.append(key, value));

        try {
          const response = await fetch("/api/upload-image", { method: "POST", body: form });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail || "上传失败");
          uploadedImages.push({ url: data.url, name: file.name, preview, hash, cached: false });
          cacheReferenceImage(hash, data.url, file.name);
          logSystem(`参考图已上传: ${file.name}`);
          renderThumbs();
        } catch (error) {
          URL.revokeObjectURL(preview);
          logSystem(`参考图上传失败: ${file.name} ${error.message}`);
        }
        els.uploadStatus.textContent = `上传中 ${i + 1}/${list.length}`;
      }
      els.uploadStatus.textContent = uploadedImages.length ? `已上传 ${uploadedImages.length} 张参考图` : "未上传参考图";
    }

    function renderThumbs() {
      els.thumbs.innerHTML = uploadedImages.map((item, index) => `
        <div class="thumb">
          <img src="${item.preview}" alt="${item.name}" loading="lazy" />
          <button type="button" title="删除" data-index="${index}">×</button>
        </div>
      `).join("");
      
      const updateStatusText = () => {
        const count = uploadedImages.length;
        els.uploadStatus.textContent = count ? `已准备 ${count} 张参考图` : "未上传参考图";
        if (els.urlStatus) {
          els.urlStatus.textContent = count ? `已准备 ${count} 张参考图` : "暂未添加链接图片";
        }
      };

      els.thumbs.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          const [removed] = uploadedImages.splice(Number(button.dataset.index), 1);
          if (removed?.preview && removed.preview.startsWith('blob:')) {
            URL.revokeObjectURL(removed.preview);
          }
          renderThumbs();
        });
      });
      updateStatusText();
    }

    function summarizePayload(payload) {
      const refs = payload.image_urls?.length ? `${payload.image_urls.length} 张参考图` : "纯生图";
      return [
        payload.size || "默认尺寸",
        payload.quality || "默认画质",
        payload.background || "默认背景",
        payload.output_format || "默认格式",
        refs,
        `并发 ${payload.concurrency}`
      ];
    }

    function normalizeRun(run, fallbackPayload = null) {
      const params = run.params || fallbackPayload || {};
      return {
        run_id: run.run_id,
        created_at: run.created_at || new Date().toISOString(),
        updated_at: run.updated_at || run.created_at || new Date().toISOString(),
        status: run.status || "running",
        prompt: run.prompt || params.prompt || "",
        model: run.model || params.model || "",
        params,
        total: run.total || params.concurrency || 0,
        done: run.done || (run.images || []).length,
        images: run.images || []
      };
    }

    function progressWidth(run) {
      const total = Number(run.total) || run.images.length || 0;
      const done = Math.max(Number(run.done) || 0, run.images.length);
      if (!total) return run.status === "completed" ? 100 : 0;
      return Math.max(0, Math.min(100, Math.round((done / total) * 100)));
    }

    function createRunGroup(payload, serverRun) {
      const run = normalizeRun(serverRun, payload);
      runs = [run, ...runs.filter(item => item.run_id !== run.run_id)];
      activeRunGroup = run;
      activeRunId = run.run_id;
      renderResults();
      return run;
    }

    function renderResults() {
      visibleGeneratedCount = runs.reduce((sum, run) => sum + run.images.length, 0);
      runCount = runs.length;
      updateGalleryCount();
      renderRunList();
      renderRunDetail();
    }

    function renderRunList() {
      if (!runs.length) {
        els.runList.innerHTML = '<div class="empty-state compact">暂无历史组</div>';
        return;
      }
      els.runList.innerHTML = runs.map((run, index) => {
        const cover = run.images[0]?.url;
        const dimensions = run.images[0]?.dimensions_label || run.params?.size || "默认尺寸";
        const created = formatRunTime(run.created_at);
        const percent = progressWidth(run);
        const progress = run.status === "running"
          ? `<span class="progress-wrap run-progress ${percent === 0 ? "is-zero" : ""}" style="--progress:${percent}%"><span class="progress-track"></span><span class="progress-bar"></span><span class="progress-glow"></span></span>`
          : "";
        return `
          <button class="result-group ${run.run_id === activeRunId ? "active" : ""}" type="button" data-run-id="${run.run_id}">
            <span class="run-cover">${cover ? `<img src="${cover}" alt="第 ${index + 1} 组封面" loading="lazy" />` : "等待"}</span>
            <span class="run-card-meta">
              <strong class="run-card-title">${escapeHtml(run.prompt || `第 ${index + 1} 组`)}</strong>
              <span>${run.images.length} 张 · ${dimensions}</span>
              <span>${created} · ${statusLabel(run.status)}</span>
            </span>
            ${progress}
          </button>
        `;
      }).join("");
      els.runList.querySelectorAll("[data-run-id]").forEach(button => {
        button.addEventListener("click", () => {
          activeRunId = button.dataset.runId;
          activeRunGroup = runs.find(run => run.run_id === activeRunId) || null;
          renderResults();
        });
      });
    }

    function renderRunDetail() {
      const run = runs.find(item => item.run_id === activeRunId);
      if (!run) {
        els.runDetail.innerHTML = '<div class="empty-state">选择左侧图组查看结果</div><div id="detailGallery" class="gallery" hidden></div>';
        els.detailGallery = document.getElementById("detailGallery");
        return;
      }
      const params = run.params || {};
      els.runDetail.innerHTML = `
        <div class="detail-header">
          <div>
            <h3 class="detail-title">${escapeHtml(run.prompt || "未命名结果组")}</h3>
            <div class="result-summary">
              <span>${escapeHtml(run.model || params.model || "未知模型")}</span>
              ${summarizePayload(params).map(item => `<span>${escapeHtml(item)}</span>`).join("")}
              <span>${formatRunTime(run.created_at)}</span>
            </div>
          </div>
          <div class="result-actions">
            <span class="status-pill">${statusLabel(run.status)} · ${run.images.length}/${run.total || run.images.length}</span>
            <button class="btn btn-small btn-warn" type="button" data-delete-run="${run.run_id}">删除整组</button>
          </div>
        </div>
        <div id="detailGallery" class="gallery">
          ${run.images.length ? run.images.map((image, index) => imageCardHtml(image, index + 1)).join("") : '<div class="empty-state compact">等待结果</div>'}
        </div>
      `;
      els.detailGallery = document.getElementById("detailGallery");
      els.runDetail.querySelector("[data-delete-run]").addEventListener("click", () => deleteRunGroup(run.run_id));
      els.detailGallery.querySelectorAll(".preview").forEach(button => {
        button.addEventListener("click", () => openLightbox(button.dataset.url));
      });
    }

    function imageCardHtml(image, index) {
      const sizeLabel = image.size_label || "大小读取中";
      const dimensionsLabel = image.dimensions_label || "尺寸读取中";
      const durationLabel = image.duration ? `${image.duration}s` : "";
      return `
        <article class="image-card">
          <button class="preview" type="button" data-url="${image.url}">
            <img src="${image.url}" alt="生成图 ${index}" loading="lazy" />
          </button>
          <div class="image-meta">
            <div class="image-meta-main">
              <span>#${index} ${durationLabel}</span>
              <a href="${image.url}" download>下载</a>
            </div>
            <div class="image-details">
              <span>${dimensionsLabel}</span>
              <span>${sizeLabel}</span>
            </div>
          </div>
        </article>
      `;
    }

    function setGroupStatus(group, status) {
      if (!group) return;
      group.status = status;
      renderResults();
    }

    function addGalleryImages(items, idx, group = activeRunGroup) {
      if (!group) return;
      items.forEach(item => {
        const image = typeof item === "string" ? { url: item } : item;
        const url = image.url;
        if (!url) return;
        totalGeneratedCount += 1;
        group.images.push(image);
        group.done = group.images.length;
      });
      renderResults();
    }

    async function loadHistory() {
      try {
        const response = await fetch("/api/history");
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "历史加载失败");
        runs = (data.runs || []).map(run => normalizeRun(run));
        activeRunId = runs[0]?.run_id || null;
        activeRunGroup = runs[0] || null;
        renderResults();
      } catch (error) {
        logSystem(error.message);
      }
    }

    async function deleteRunGroup(runId, options = {}) {
      const run = runs.find(item => item.run_id === runId);
      if (!run) return;
      if (isRunActive(runId)) {
        logSystem("该结果组仍在生成中，完成后再删除。");
        return;
      }
      if (!options.skipConfirm && !confirm(`删除该组 ${run.images.length} 张图片文件？`)) return;
      try {
        const response = await fetch(`/api/history/${encodeURIComponent(runId)}`, { method: "DELETE" });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "删除失败");
        runs = runs.filter(item => item.run_id !== runId);
        if (activeRunId === runId) {
          activeRunId = runs[0]?.run_id || null;
          activeRunGroup = runs[0] || null;
        }
        renderResults();
        logSystem(`已删除结果组: ${runId}`);
      } catch (error) {
        logSystem(error.message);
      }
    }

    function isRunActive(runId) {
      return Array.from(activeTasks.values()).some(task => task.runId === runId);
    }

    function formatRunTime(value) {
      if (!value) return "未知时间";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", { hour12: false, month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    }

    function statusLabel(status) {
      return {
        running: "生成中",
        completed: "已完成",
        error: "有错误"
      }[status] || status || "未知";
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function openLightbox(url) {
      els.lightboxImage.src = url;
      els.lightbox.classList.add("show");
    }

    function closeLightbox() {
      els.lightbox.classList.remove("show");
      els.lightboxImage.src = "";
    }

    async function startGeneration() {
      const model = els.model.value;
      let apiKey = localStorage.getItem("apiqik_key") || "";
      if (model === "gpt-image-2-vip" && localStorage.getItem("apiqik_vip_key")) {
        apiKey = localStorage.getItem("apiqik_vip_key");
      }
      const prompt = els.prompt.value.trim();
      const concurrency = Number(els.concurrency.value);

      if (!apiKey) {
        updateKeyState();
        logSystem(model === "gpt-image-2-vip" ? "缺少 APIQIK Key 或 VIP Key，请先在设置页保存密钥。" : "请先配置 APIQIK Key。");
        return;
      }
      if (!prompt) {
        logSystem("请输入提示词。");
        return;
      }
      if (!Number.isInteger(concurrency) || concurrency < 1 || concurrency > 50) {
        logSystem("并发数量必须在 1 到 50 之间。");
        return;
      }

      setRunState("busy", "提交中");

      let finalSize = els.size.value;
      let finalRatio = els.ratio.value;

      if (finalRatio === "custom") {
        finalRatio = "";
        if (!els.customSize.value) {
            logSystem("请输入自定义尺寸。");
            setRunState("", "待开始");
            return;
        }
      }

      if ((model === "gpt-image-2-flatfee" || model === "gpt-image-2-vip") && els.customSize.value && els.ratio.value === "custom") {
        fixCustomSize();
        if (els.customSize.value) finalSize = els.customSize.value;
      }
      if (model === "gpt-image-2-flatfee-2k" || model === "gpt-image-2-flatfee-4k") {
        finalSize = "";
        finalRatio = "";
      }

      const payload = {
        api_key: apiKey,
        base_url: localStorage.getItem("apiqik_base_url") || "https://value.apiqik.online",
        prompt,
        model,
        size: finalSize,
        ratio: finalRatio,
        quality: els.quality.value,
        background: els.background.value,
        output_format: els.outputFormat.value,
        concurrency,
        image_urls: getImageUrls()
      };

      let submittedRun = null;
      try {
        const response = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "任务提交失败");

        logSystem(`任务已创建: ${data.task_id}`);
        submittedRun = createRunGroup(payload, data.run || { run_id: data.run_id || data.task_id, params: payload, prompt, model: payload.model });
        activeRunGroup = submittedRun;
        setGroupStatus(submittedRun, "running");
        subscribeTask(data.task_id, submittedRun.run_id);
        updateActiveTaskState();
      } catch (error) {
        setGroupStatus(submittedRun, "error");
        updateActiveTaskState();
        if (!activeTasks.size) setRunState("bad", "提交失败");
        logSystem(error.message);
      }
    }

    function subscribeTask(taskId, runId) {
      const source = new EventSource(`/api/tasks/${taskId}/stream`);
      activeTasks.set(taskId, { source, runId });
      source.onmessage = (message) => {
        const event = JSON.parse(message.data);
        handleTaskEvent(event, runId, taskId);
      };
      source.addEventListener("ping", () => { });
      source.onerror = () => {
        logSystem("实时连接中断。");
        const group = runs.find(run => run.run_id === runId);
        setGroupStatus(group, "error");
        source.close();
        activeTasks.delete(taskId);
        updateActiveTaskState();
      };
    }

    function handleTaskEvent(event, fallbackRunId, taskId) {
      const runId = event.run_id || fallbackRunId;
      const group = runs.find(run => run.run_id === runId);
      if (event.type === "log") {
        logSystem(event.message);
      } else if (event.type === "progress") {
        if (group) {
          group.done = event.done;
          group.total = event.total;
          renderResults();
        }
      } else if (event.type === "result") {
        logSystem(`任务 ${event.idx} 成功，耗时 ${event.duration}s`);
        const imagesToAdding = (event.images || event.urls || []).map(img => {
            const i = typeof img === "string" ? { url: img } : img;
            if (event.duration) i.duration = event.duration;
            return i;
        });
        addGalleryImages(imagesToAdding, event.idx, group);
      } else if (event.type === "error") {
        logSystem(`任务 ${event.idx} 失败: ${event.message}`);
        setGroupStatus(group, "error");
      } else if (event.type === "done") {
        if (group) {
          group.done = group.total || group.done || group.images.length;
        }
        setGroupStatus(group, "completed");
        const task = activeTasks.get(taskId);
        if (task) task.source.close();
        activeTasks.delete(taskId);
        updateActiveTaskState();
      }
    }

    function bindUpload() {
      els.dropzone.addEventListener("click", () => els.fileInput.click());
      els.fileInput.addEventListener("change", () => uploadFiles(els.fileInput.files));

      ["dragenter", "dragover"].forEach(name => {
        els.dropzone.addEventListener(name, event => {
          event.preventDefault();
          els.dropzone.classList.add("dragging");
        });
      });
      ["dragleave", "drop"].forEach(name => {
        els.dropzone.addEventListener(name, event => {
          event.preventDefault();
          els.dropzone.classList.remove("dragging");
        });
      });
      els.dropzone.addEventListener("drop", event => uploadFiles(event.dataTransfer.files));

      els.tabUploadBtn.addEventListener("click", () => {
        els.tabUploadBtn.style.background = "var(--surface)";
        els.tabUploadBtn.style.color = "var(--text)";
        els.tabUrlBtn.style.background = "transparent";
        els.tabUrlBtn.style.color = "var(--muted)";
        els.uploadPanel.style.display = "block";
        els.urlPanel.style.display = "none";
      });

      els.tabUrlBtn.addEventListener("click", () => {
        els.tabUrlBtn.style.background = "var(--surface)";
        els.tabUrlBtn.style.color = "var(--text)";
        els.tabUploadBtn.style.background = "transparent";
        els.tabUploadBtn.style.color = "var(--muted)";
        els.uploadPanel.style.display = "none";
        els.urlPanel.style.display = "block";
      });

      els.addUrlBtn.addEventListener("click", () => {
        const url = els.urlInput.value.trim();
        if (!url) return;
        if (!url.startsWith("http://") && !url.startsWith("https://")) {
            logSystem("请输入有效的图片链接 (以 http/https 开头)。");
            return;
        }
        
        uploadedImages.push({
          url: url,
          name: url.split("/").pop() || "网络链接",
          preview: url,
          size: 0,
          cached: true
        });
        renderThumbs();
        els.urlInput.value = "";
      });
    }

    function init() {
      initLinkedSizeControls();
      updateKeyState();
      bindUpload();
      els.startBtn.addEventListener("click", startGeneration);
      els.clearBtn.addEventListener("click", clearLogs);
      els.clearResultsBtn.addEventListener("click", clearResults);
      els.closeLightbox.addEventListener("click", closeLightbox);
      els.lightbox.addEventListener("click", event => {
        if (event.target === els.lightbox) closeLightbox();
      });
      window.addEventListener("storage", updateKeyState);
      logSystem("Web 应用已就绪。");
      loadHistory();
    }

    init();
  </script>
</body>

</html>
