<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APIQIK 密钥配置</title>
  <meta name="description" content="配置 APIQIK 图像生成所需的 API 密钥和 Cloudflare R2 存储信息" />
  <link rel="icon"
    href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="12" fill="%2307070f"/><path d="M18 34h28v16H18z" fill="%233b82f6"/><path d="M24 34V24a8 8 0 0 1 16 0v10" fill="none" stroke="%2306b6d4" stroke-width="5"/></svg>' />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/tokens.css">
  <link rel="stylesheet" href="/static/css/themes/apple-light.css">
  <link rel="stylesheet" href="/static/css/themes/apple-dark.css">
  <link rel="stylesheet" href="/static/css/themes/claude-light.css">
  <link rel="stylesheet" href="/static/css/themes/claude-dark.css">
  <link rel="stylesheet" href="/static/css/themes/vercel-light.css">
  <link rel="stylesheet" href="/static/css/themes/vercel-dark.css">
  <script>
    (function () {
      var s = localStorage.getItem('theme-style') || 'claude';
      var m = localStorage.getItem('theme-mode') || 'dark';
      document.documentElement.setAttribute('data-theme', s + '-' + m);
    })();
  </script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      /* Background gradient removed as per request */
    }

    :root {
      /* Tokens fallback for settings specific colors if not in tokens */
      --settings-accent: var(--accent);
      --settings-surface: var(--surface-primary);
      --settings-border: var(--border);
    }

    /* ── 顶部导航 ── */
    .nav {
      width: 100%;
      max-width: 760px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color .2s;
    }

    .nav-back:hover {
      color: var(--text);
    }

    .nav-back svg {
      width: 18px;
      height: 18px;
    }

    .nav-title {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ── 卡片 ── */
    .card {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      backdrop-filter: blur(20px);
      box-shadow: var(--glow);
      margin-bottom: 20px;
      transition: border-color .2s;
    }

    .card:hover {
      border-color: var(--border-h);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title svg {
      width: 16px;
      height: 16px;
    }

    summary.card-title {
      cursor: pointer;
      list-style: none;
    }

    summary.card-title::-webkit-details-marker {
      display: none;
    }

    .optional-card .card-title::after {
      content: "展开";
      margin-left: auto;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
    }

    .optional-card[open] .card-title::after {
      content: "收起";
    }

    .optional-card:not([open]) .card-title {
      margin-bottom: 0;
    }

    .optional-badge {
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
    }

    /* ── 表单行 ── */
    .field {
      display: grid;
      grid-template-columns: 200px 1fr;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .field:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .field:first-of-type {
      padding-top: 0;
    }

    .field-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .field-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .field-input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 10px 44px 10px 14px;
      font-size: 14px;
      font-family: 'Inter', monospace;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .field input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    /* 密钥显示/隐藏按钮 */
    .toggle-vis {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 2px;
      transition: color .2s;
    }

    .toggle-vis:hover {
      color: var(--text);
    }

    .toggle-vis svg {
      width: 18px;
      height: 18px;
    }

    /* ── 操作按钮区 ── */
    .actions {
      width: 100%;
      max-width: 760px;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(59, 130, 246, 0.55);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    /* ── 状态提示 ── */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.4);
      color: var(--success);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      backdrop-filter: blur(12px);
      transition: transform .3s ease, opacity .3s ease;
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.error {
      background: rgba(248, 113, 113, 0.15);
      border-color: rgba(248, 113, 113, 0.4);
      color: var(--error);
    }

    /* ── 分割线 ── */
    .divider {
      width: 100%;
      max-width: 760px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
      margin: 4px 0 20px;
    }

    /* 必填标记 */
    .required {
      color: var(--accent);
      margin-left: 2px;
    }

    /* 状态指示点 */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }

    .status-dot.ok {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .status-dot.bad {
      background: var(--error);
      box-shadow: 0 0 6px var(--error);
    }

    .status-dot.none {
      background: var(--muted);
    }

    #status-bar {
      width: 100%;
      max-width: 760px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 20px;
      backdrop-filter: blur(12px);
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .status-item {
      display: flex;
      align-items: center;
    }

    @media (max-width: 640px) {

      html,
      body {
        width: 100%;
        overflow-x: hidden;
      }

      body {
        align-items: stretch;
        padding: 14px 10px 88px;
      }

      .nav {
        max-width: none;
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        gap: 10px 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      .nav-back {
        min-height: 40px;
      }

      .nav-title {
        justify-self: end;
        font-size: 16px;
      }

      .theme-controls {
        grid-column: 1 / -1;
        display: grid !important;
        grid-template-columns: 40px minmax(0, 1fr) 40px;
        gap: 8px !important;
        min-width: 0;
      }

      .theme-controls .btn {
        min-height: 40px;
      }

      #theme-style-select {
        width: 100% !important;
        min-width: 0 !important;
        height: 40px;
        font-size: 13px !important;
      }

      #status-bar {
        max-width: none;
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        padding: 12px 14px;
        margin-bottom: 14px;
      }

      #status-bar>span:last-child {
        margin-left: 0 !important;
        line-height: 1.5;
      }

      .card {
        max-width: none;
        padding: 18px 14px;
        border-radius: 12px;
        margin-bottom: 14px;
      }

      .card-title {
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 18px;
        line-height: 1.45;
      }

      .card-title span {
        display: block;
        margin-left: 0 !important;
        width: 100%;
      }

      .card-title .optional-badge {
        display: inline-block;
        width: auto;
      }

      .field {
        grid-template-columns: 1fr;
        align-items: stretch;
        gap: 8px;
        padding: 14px 0;
      }

      .field-label {
        font-size: 13px;
      }

      .field-hint {
        line-height: 1.45;
      }

      .field input {
        min-height: 44px;
        font-size: 16px;
      }

      .toggle-vis {
        width: 36px;
        height: 36px;
        justify-content: center;
        right: 8px;
      }

      .divider {
        max-width: none;
        margin: 0 0 14px;
      }

      .actions {
        max-width: none;
        flex-direction: column-reverse;
        gap: 10px;
        margin-top: 4px;
      }

      .actions .btn {
        width: 100%;
        justify-content: center;
        min-height: 46px;
      }

      .toast {
        width: max-content;
        max-width: calc(100vw - 24px);
        bottom: 16px;
        padding: 12px 14px;
        line-height: 1.45;
      }
    }
  </style>
</head>

<body>

  <!-- 顶部导航 -->
  <nav class="nav">
    <a href="/" class="nav-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M5 12l7 7M5 12l7-7" />
      </svg>
      返回主页
    </a>
    <span class="nav-title">⚙ 密钥配置</span>
    <div class="theme-controls" style="display: flex; gap: 8px;">
      <a class="btn btn-ghost" href="https://github.com/Seren-dipity/APIQIK-GG-WebUI" target="_blank" title="GitHub 仓库"
        style="padding: 4px; width: 32px; height: 32px; display: grid; place-items: center; border-radius: 8px; color: var(--ink-secondary);">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <path
            d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22" />
        </svg>
      </a>
      <select id="theme-style-select" class="btn btn-ghost" onchange="ThemeManager.setStyle(this.value)"
        style="width: auto; min-width: 100px; padding: 4px 8px; border-radius: 8px; font-size: 12px;">
        <option value="apple">Apple Style</option>
        <option value="claude">Claude Style</option>
        <option value="vercel">Vercel Style</option>
      </select>
      <button id="theme-mode-toggle" class="btn btn-ghost" onclick="ThemeManager.toggleMode()" title="切换模式"
        style="padding: 4px; width: 32px; height: 32px; display: grid; place-items: center; border-radius: 8px;">
        <!-- Icon injected via JS -->
      </button>
    </div>
  </nav>

  <!-- 配置状态栏 -->
  <div id="status-bar">
    <span class="status-item"><span id="dot-api" class="status-dot none"></span>APIQIK Key</span>
    <span class="status-item"><span id="dot-r2" class="status-dot none"></span>Cloudflare R2</span>
    <span style="margin-left:auto;font-size:12px;">配置储存在浏览器本地，不会上传至服务器</span>
  </div>

  <!-- APIQIK 配置 -->
  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
      APIQIK 配置
    </div>

    <div class="field">
      <div>
        <div class="field-label">API Key <span class="required">*</span></div>
        <div class="field-hint">推荐使用Auto分组令牌，全部模型共用这一枚 Key</div>
      </div>
      <div class="field-input-wrap">
        <input id="apiqik_key" type="password" placeholder="sk-..." autocomplete="off" />
        <button class="toggle-vis" data-target="apiqik_key" title="显示/隐藏">
          <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <div>
        <div class="field-label">Base URL</div>
        <div class="field-hint">留空使用默认地址</div>
      </div>
      <div class="field-input-wrap">
        <input id="apiqik_base_url" type="text" placeholder="https://value.apiqik.online" />
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Cloudflare R2 配置 -->
  <details class="card optional-card" id="cloudflareConfig">
    <summary class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 16 12 12 8 16" />
        <line x1="12" y1="12" x2="12" y2="21" />
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3" />
      </svg>
      Cloudflare R2 配置
      <span class="optional-badge">选配</span>
      <span
        style="font-size:12px;font-weight:400;color:var(--muted);text-transform:none;letter-spacing:0;margin-left:8px;">自建图床需要</span>
    </summary>

    <div class="field">
      <div>
        <div class="field-label">Access Key ID</div>
        <div class="field-hint">R2 API 令牌访问密钥 ID</div>
      </div>
      <div class="field-input-wrap">
        <input id="cf_access_key" type="password" placeholder="Access Key ID" autocomplete="off" />
        <button class="toggle-vis" data-target="cf_access_key" title="显示/隐藏">
          <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <div>
        <div class="field-label">Secret Access Key</div>
        <div class="field-hint">R2 API 令牌密钥</div>
      </div>
      <div class="field-input-wrap">
        <input id="cf_secret_key" type="password" placeholder="Secret Access Key" autocomplete="off" />
        <button class="toggle-vis" data-target="cf_secret_key" title="显示/隐藏">
          <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>
    </div>

    <div class="field">
      <div>
        <div class="field-label">Account ID</div>
        <div class="field-hint">Cloudflare 账户 ID</div>
      </div>
      <div class="field-input-wrap">
        <input id="cf_account_id" type="text" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
      </div>
    </div>

    <div class="field">
      <div>
        <div class="field-label">Bucket 名称</div>
        <div class="field-hint">R2 存储桶名称</div>
      </div>
      <div class="field-input-wrap">
        <input id="cf_bucket" type="text" placeholder="my-bucket" />
      </div>
    </div>

    <div class="field">
      <div>
        <div class="field-label">公开访问 URL</div>
        <div class="field-hint">R2 自定义域名或公开端点前缀</div>
      </div>
      <div class="field-input-wrap">
        <input id="cf_public_url" type="text" placeholder="https://pub-xxx.r2.dev" />
      </div>
    </div>
  </details>

  <!-- 操作按钮 -->
  <div class="actions">
    <button class="btn btn-ghost" onclick="clearAll()">清除所有配置</button>
    <button class="btn btn-primary" onclick="saveAll()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
        <polyline points="20 6 9 17 4 12" />
      </svg>
      保存配置
    </button>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script>
    const KEYS = ['apiqik_key', 'apiqik_base_url', 'cf_access_key', 'cf_secret_key', 'cf_account_id', 'cf_bucket', 'cf_public_url'];
    const LEGACY_KEYS = ['apiqik_vip_key'];

    // 页面加载时从 localStorage 回填
    function loadFromStorage() {
      LEGACY_KEYS.forEach(k => localStorage.removeItem(k));
      KEYS.forEach(k => {
        const val = localStorage.getItem(k) || '';
        const el = document.getElementById(k);
        if (el) el.value = val;
      });
      updateStatusBar();
    }

    function updateStatusBar() {
      const hasApiKey = !!localStorage.getItem('apiqik_key');
      const r2Keys = ['cf_access_key', 'cf_secret_key', 'cf_account_id', 'cf_bucket', 'cf_public_url'];
      const hasR2 = r2Keys.every(k => !!localStorage.getItem(k));

      document.getElementById('dot-api').className = `status-dot ${hasApiKey ? 'ok' : 'bad'}`;
      document.getElementById('dot-r2').className = `status-dot ${hasR2 ? 'ok' : (r2Keys.some(k => !!localStorage.getItem(k)) ? 'bad' : 'none')}`;
    }

    function saveAll() {
      let hasError = false;

      LEGACY_KEYS.forEach(k => localStorage.removeItem(k));
      KEYS.forEach(k => {
        const el = document.getElementById(k);
        if (el) {
          const val = el.value.trim();
          if (val) {
            localStorage.setItem(k, val);
          } else {
            localStorage.removeItem(k);
          }
        }
      });

      if (!localStorage.getItem('apiqik_key')) {
        showToast('APIQIK Key 未填写，生成功能将无法使用', true);
        hasError = true;
      }

      updateStatusBar();
      if (!hasError) showToast('配置已保存到浏览器本地 ✓');
    }

    function clearAll() {
      if (!confirm('确认清除所有已保存的配置？')) return;
      LEGACY_KEYS.forEach(k => localStorage.removeItem(k));
      KEYS.forEach(k => localStorage.removeItem(k));
      KEYS.forEach(k => {
        const el = document.getElementById(k);
        if (el) el.value = '';
      });
      updateStatusBar();
      showToast('配置已清除');
    }

    // 显示/隐藏密钥
    document.querySelectorAll('.toggle-vis').forEach(btn => {
      btn.addEventListener('click', () => {
        const targetId = btn.dataset.target;
        const input = document.getElementById(targetId);
        if (!input) return;
        input.type = input.type === 'password' ? 'text' : 'password';
      });
    });

    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast${isError ? ' error' : ''} show`;
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    loadFromStorage();
  </script>
  <script src="/static/js/theme.js"></script>
</body>

</html>
